services:
  migrate:
    image: ${KLEIS_MIGRATE_IMAGE:?set KLEIS_MIGRATE_IMAGE}
    env_file:
      - path: .env
        required: false
    restart: "no"

  app:
    image: ${KLEIS_APP_IMAGE:?set KLEIS_APP_IMAGE}
    container_name: kleis-app
    env_file:
      - path: .env
        required: false
    init: true
    ports:
      - "127.0.0.1:3003:3003"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3003/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
