services:
  migrate:
    build:
      context: .
      target: migrate
    env_file:
      - path: .env
        required: false
    restart: "no"

  app:
    build:
      context: .
      target: release
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - path: .env
        required: false
    init: true
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
